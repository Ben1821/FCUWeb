<!DOCTYPE html>
<html class="staticrypt-html" lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <title>114學年度交通安全教育訪視及輔導</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link href="https://fonts.googleapis.com/css?family=Lora:700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700,800" rel="stylesheet"
        type="text/css" />
    <style>
        :root {
            color-scheme: light;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --panel-border: rgba(124, 68, 73, 0.14);
            --panel-shadow: 0 1.5rem 3rem rgba(20, 37, 43, 0.18);
            --primary: #7c4449;
            --primary-dark: #62353a;
            --text-main: #213038;
            --text-muted: #53636b;
            --field-bg: rgba(124, 68, 73, 0.06);
            --field-border: rgba(124, 68, 73, 0.12);
            --error-bg: rgba(183, 65, 65, 0.12);
            --error-text: #932f2f;
        }

        * {
            box-sizing: border-box;
        }

        .staticrypt-html,
        .staticrypt-body {
            min-height: 100%;
            margin: 0;
        }

        .staticrypt-body {
            font-family: "Open Sans", sans-serif;
            color: var(--text-main);
            background:
                linear-gradient(135deg, rgba(24, 135, 154, 0.9), rgba(14, 58, 73, 0.92)),
                url("assets/img/MainPagePic/location.jpg") center center / cover no-repeat fixed;
        }

        .staticrypt-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }

        .staticrypt-card {
            width: min(100%, 1040px);
            display: grid;
            grid-template-columns: minmax(280px, 1.05fr) minmax(320px, 0.95fr);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 1.6rem;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: var(--panel-shadow);
            backdrop-filter: blur(12px);
        }

        .staticrypt-hero {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 34rem;
            padding: 2.25rem;
            background:
                linear-gradient(180deg, rgba(9, 33, 42, 0.08), rgba(9, 33, 42, 0.7)),
                url("assets/img/MainPagePic/transportation_analyze.jpg") center center / cover no-repeat;
            color: #fff;
        }

        .staticrypt-hero::before {
            content: "";
            position: absolute;
            inset: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 1rem;
            pointer-events: none;
        }

        .staticrypt-hero-content {
            position: relative;
            z-index: 1;
            max-width: 28rem;
        }

        .staticrypt-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .staticrypt-brand {
            margin: 1.35rem 0 1rem;
            max-width: 15rem;
        }

        .staticrypt-hero h1 {
            margin: 0 0 0.9rem;
            font-family: "Lora", serif;
            font-size: clamp(2rem, 3vw, 3rem);
            line-height: 1.15;
        }

        .staticrypt-hero p {
            margin: 0;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.88);
        }

        .staticrypt-panel {
            display: flex;
            align-items: center;
            background: var(--panel-bg);
            padding: 2.25rem;
        }

        .staticrypt-panel-inner {
            width: min(100%, 25rem);
            margin: 0 auto;
        }

        .staticrypt-title {
            margin: 0 0 0.65rem;
            font-size: 2rem;
            line-height: 1.2;
            color: var(--text-main);
        }

        .staticrypt-instructions {
            margin: 0 0 1.6rem;
            color: var(--text-muted);
            line-height: 1.75;
        }

        .staticrypt-form {
            display: grid;
            gap: 1rem;
        }

        .staticrypt-password-container {
            position: relative;
            border: 1px solid var(--field-border);
            border-radius: 1rem;
            background: var(--field-bg);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .staticrypt-password-container:focus-within {
            border-color: rgba(124, 68, 73, 0.36);
            box-shadow: 0 0 0 0.2rem rgba(124, 68, 73, 0.12);
        }

        .staticrypt-password {
            width: 100%;
            padding: 1rem 3.4rem 1rem 1rem;
            border: 0;
            border-radius: 1rem;
            background: transparent;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
        }

        .staticrypt-password::placeholder {
            color: rgba(83, 99, 107, 0.82);
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            position: absolute;
            right: 0.9rem;
            top: 50%;
            width: 1.25rem;
            height: 1.25rem;
            transform: translateY(-50%);
            opacity: 0.72;
        }

        .staticrypt-error {
            display: none;
            margin: 0;
            padding: 0.85rem 1rem;
            border-radius: 0.9rem;
            background: var(--error-bg);
            color: var(--error-text);
            font-size: 0.95rem;
        }

        .staticrypt-error.is-visible {
            display: block;
        }

        .staticrypt-decrypt-button {
            border: 0;
            border-radius: 999px;
            padding: 0.95rem 1.25rem;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .staticrypt-decrypt-button:hover,
        .staticrypt-decrypt-button:focus {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 1rem 1.8rem rgba(124, 68, 73, 0.2);
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .staticrypt-remember input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--primary);
        }

        .staticrypt-footnote {
            margin-top: 1.3rem;
            color: var(--text-muted);
            font-size: 0.86rem;
            line-height: 1.7;
        }

        .hidden {
            display: none !important;
        }

        .staticrypt-spinner-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 2.5rem;
            height: 2.5rem;
            border: 0.24rem solid rgba(255, 255, 255, 0.36);
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 900px) {
            .staticrypt-card {
                grid-template-columns: 1fr;
            }

            .staticrypt-hero {
                min-height: 18rem;
            }
        }

        @media (max-width: 640px) {
            .staticrypt-shell {
                padding: 1rem;
            }

            .staticrypt-hero,
            .staticrypt-panel {
                padding: 1.4rem;
            }

            .staticrypt-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
